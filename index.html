<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaktia e Namazit - Xhamia Topanicë 1</title>
<style>
*{box-sizing:border-box}
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial,Helvetica,sans-serif;
  color:white;
  background:
    radial-gradient(circle at 18% 0%,rgba(96,166,205,.35),transparent 32%),
    linear-gradient(135deg,#4b7fa2 0%,#2c5a79 42%,#17324c 100%);
}
.screen{
  width:100vw;
  height:100vh;
  padding:16px 28px 20px;
  display:grid;
  grid-template-rows:145px 1fr 44px;
  gap:28px;
}
.header{
  background:rgba(8,27,48,.72);
  border-radius:7px;
  box-shadow:0 10px 24px rgba(0,0,0,.22);
  display:grid;
  grid-template-columns:1fr 1fr 165px;
  align-items:center;
  padding:18px 26px;
}
.title{
  color:#6ed8b6;
}
.title-main{
  font-size:36px;
  line-height:1.12;
  font-weight:400;
}
.title-sub{
  margin-top:8px;
  font-size:23px;
  color:#71d4b7;
}
.timeTop{
  text-align:center;
}
#clock{
  font-size:78px;
  font-weight:300;
  line-height:.95;
  letter-spacing:1px;
}
#date{
  margin-top:13px;
  font-size:22px;
  color:#69d7b8;
}
.logo{
  justify-self:end;
  width:115px;
  height:115px;
  border-radius:50%;
  background:#f5f7f7;
  color:#08704f;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  border:2px solid rgba(255,255,255,.85);
  box-shadow:0 6px 18px rgba(0,0,0,.25);
  font-weight:bold;
  line-height:1.08;
  font-size:18px;
}
.logo small{
  font-size:15px;
}
.cards{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:22px;
  min-height:0;
}
.card{
  position:relative;
  background:rgba(9,29,50,.72);
  border:1px solid rgba(255,255,255,.14);
  border-radius:7px;
  box-shadow:inset 0 0 38px rgba(255,255,255,.025),0 10px 22px rgba(0,0,0,.18);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding-top:72px;
}
.card.active{
  background:
    radial-gradient(circle at 52% 30%,rgba(255,255,255,.23),transparent 17%),
    linear-gradient(180deg,#a9bbc4 0%,#c0c0bd 45%,#e6ba92 100%);
  border-color:rgba(255,255,255,.58);
}
.card.active .name,
.card.active .time,
.card.active .icon,
.card.active .subTimes,
.card.active .fixedTime{
  color:white;
}
.countdown{
  position:absolute;
  top:54px;
  left:24px;
  right:24px;
  background:rgba(25,44,62,.78);
  border-radius:5px;
  height:56px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:"Courier New",monospace;
  font-size:32px;
  letter-spacing:1px;
  z-index:3;
}
.inner{
  height:275px;
  display:grid;
  grid-template-rows:76px 48px 78px 42px;
  align-items:center;
  justify-items:center;
  transform:translateY(10px);
}
.icon{
  font-size:56px;
  height:76px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.icon-img{
  font-size:62px;
  filter:drop-shadow(0 2px 0 rgba(0,0,0,.45));
}
.name{
  font-size:34px;
  font-weight:400;
  line-height:1;
}
.time{
  font-size:64px;
  font-weight:300;
  line-height:1;
  letter-spacing:1px;
}
.subTimes{
  font-size:30px;
  line-height:1;
  display:flex;
  gap:24px;
  align-items:center;
  justify-content:center;
}
.fixedTime{
  font-size:30px;
  line-height:1;
}
.footer{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  align-items:center;
  color:white;
  font-size:20px;
  padding:0 4px;
}
.footer .center{
  text-align:center;
  color:#68d5b2;
  font-weight:bold;
}
.footer .right{
  text-align:right;
  font-size:28px;
}
@media(max-width:900px){
  body{overflow:auto}
  .screen{height:auto;min-height:100vh;grid-template-rows:auto auto auto;padding:14px;gap:16px}
  .header{grid-template-columns:1fr;text-align:center;gap:14px}
  .logo{justify-self:center}
  .cards{grid-template-columns:1fr}
  .card{height:450px}
  #clock{font-size:58px}
}
</style>
</head>
<body>
<div class="screen">
  <div class="header">
    <div class="title">
      <div class="title-main">Xhamia e fshatit<br>Topanicë 1</div>
      <div class="title-sub">Topanicë · Kamenicë</div>
    </div>
    <div class="timeTop">
      <div id="clock">--:--</div>
      <div id="date">--</div>
    </div>
    <div class="logo">
      BIK<br><small>Takvimi</small><small>2026</small>
    </div>
  </div>

  <div class="cards" id="cards"></div>

  <div class="footer">
    <div>⌂&nbsp; General</div>
    <div class="center">Made in JUPI</div>
    <div class="right">⚙</div>
  </div>
</div>

<script>
/*
  Kohët janë vendosur sipas shembullit të fotos.
  Pastaj mund t'i zëvendësosh me tabelën zyrtare BIK 2026 brenda objektit TAKVIMI.
*/
var TAKVIMI={
  "2026-05-23":{
    imsaku:"02:56",
    sabahu:"03:16",
    lindja:"04:58",
    dreka:"12:35",
    ikindia:"16:36",
    akshami:"20:06",
    jacia:"22:02"
  }
};

var DEFAULT_TIMES={
  imsaku:"02:56",
  sabahu:"03:16",
  lindja:"04:58",
  dreka:"12:35",
  ikindia:"16:36",
  akshami:"20:06",
  jacia:"22:02"
};

var ORDER=["Imsaku","Dreka","Ikindia","Akshami","Jacia"];

function pad(n){return (n<10?"0":"")+n}
function keyDate(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())}
function toMin(t){var p=t.split(":");return parseInt(p[0],10)*60+parseInt(p[1],10)}
function getTimes(d){
  var r=TAKVIMI[keyDate(d)] || DEFAULT_TIMES;
  return {
    Imsaku:r.imsaku,
    Sabahu:r.sabahu,
    Lindja:r.lindja,
    Dreka:r.dreka,
    Ikindia:r.ikindia,
    Akshami:r.akshami,
    Jacia:r.jacia
  };
}
function nextPrayer(times,now){
  var cur=now.getHours()*60+now.getMinutes()+now.getSeconds()/60;
  var next="Imsaku",remain=0;
  for(var i=0;i<ORDER.length;i++){
    var m=toMin(times[ORDER[i]]);
    if(m>cur){next=ORDER[i];remain=m-cur;break}
  }
  if(remain===0){remain=toMin(times.Imsaku)+1440-cur}
  return {name:next,remain:remain};
}
function formatRemain(mins){
  var sec=Math.max(0,Math.floor(mins*60));
  var h=Math.floor(sec/3600);
  var m=Math.floor((sec%3600)/60);
  var s=sec%60;
  return pad(h)+":"+pad(m)+":"+pad(s);
}
function isSummerTime(d){
  var jan=new Date(d.getFullYear(),0,1).getTimezoneOffset();
  return d.getTimezoneOffset()<jan;
}
function iconFor(n){
  if(n==="Imsaku") return "◓";
  if(n==="Dreka") return "☀";
  if(n==="Ikindia") return "🌅";
  if(n==="Akshami") return "◒";
  if(n==="Jacia") return "☾";
  return "";
}
function timeFor(times,n){
  if(n==="Imsaku") return times.Imsaku;
  if(n==="Dreka") return times.Dreka;
  if(n==="Ikindia") return times.Ikindia;
  if(n==="Akshami") return times.Akshami;
  if(n==="Jacia") return times.Jacia;
}
function update(){
  var now=new Date();
  var hh=pad(now.getHours()),mm=pad(now.getMinutes());
  document.getElementById("clock").innerHTML=hh+":"+mm;
  document.getElementById("date").innerHTML=pad(now.getDate())+"."+pad(now.getMonth()+1)+"."+now.getFullYear()+" / 6 Dhul Hixhxhe 1447";

  var times=getTimes(now);
  var np=nextPrayer(times,now);
  var html="";

  for(var i=0;i<ORDER.length;i++){
    var n=ORDER[i];
    var active=(n===np.name);
    html+='<div class="card '+(active?'active':'')+'">';
    if(active && n!=="Dreka"){
      html+='<div class="countdown">'+formatRemain(np.remain)+'</div>';
    }
    html+='<div class="inner">';
    html+='<div class="icon '+(n==="Ikindia"?'icon-img':'')+'">'+iconFor(n)+'</div>';
    html+='<div class="name">'+n+'</div>';
    html+='<div class="time">'+timeFor(times,n)+'</div>';

    if(n==="Imsaku"){
      html+='<div class="subTimes"><span>'+times.Sabahu+'</span><span>'+times.Lindja+'</span></div>';
    } else if(n==="Dreka"){
      html+='<div class="fixedTime">'+(isSummerTime(now)?"13:00":"12:00")+'</div>';
    } else {
      html+='<div class="subTimes"></div>';
    }

    html+='</div></div>';
  }

  document.getElementById("cards").innerHTML=html;
}
update();
setInterval(update,1000);
</script>
</body>
</html>
