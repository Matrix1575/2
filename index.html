<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vaktia e Namazit - Topanicë 1</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Arial,Helvetica,sans-serif;
color:#fff;
background:linear-gradient(180deg,#627684 0%,#4b5f6d 38%,#26323b 100%);
}

.container{
height:100vh;
padding:18px 24px 12px;
display:flex;
flex-direction:column;
}

.headerline{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:18px;
}

.lefttitle{
text-align:left;
font-weight:900;
}

.small{
font-size:34px;
font-weight:900;
line-height:1;
text-shadow:0 3px 10px rgba(0,0,0,.75);
}

.big{
font-size:42px;
font-weight:900;
line-height:.95;
margin-top:4px;
letter-spacing:.3px;
text-shadow:0 4px 14px rgba(0,0,0,.85);
}

.rightclock{
text-align:right;
padding-top:8px;
}

.timebig{
font-size:58px;
font-weight:900;
line-height:1;
text-shadow:0 4px 14px rgba(0,0,0,.85);
}

.status{
height:0;
overflow:hidden;
}

.cols{
flex:1;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:14px;
min-height:0;
padding-top:70px;
padding-bottom:18px;
}

.col{
position:relative;
overflow:hidden;
border-radius:18px;
border:2px solid rgba(255,255,255,.25);
background:rgba(255,255,255,.08);
transition:.45s ease;
box-shadow:0 12px 32px rgba(0,0,0,.28);
}

.col::before{
content:"";
position:absolute;
inset:0;
background-image:var(--photo);
background-size:500% auto;
background-position:var(--pos) center;
background-repeat:no-repeat;

transition:background-image .8s ease,filter .45s ease;
}

.col::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to bottom,rgba(0,0,0,.30),rgba(0,0,0,.04) 40%,rgba(0,0,0,.66) 100%);
}

.col.active{
transform:translateY(-6px);
border:4px solid #ffe77d;
box-shadow:0 0 34px rgba(255,222,92,.8),0 16px 44px rgba(0,0,0,.55);
}

.col.active::before{

}

.info{
position:absolute;
left:0;
right:0;
top:50%;
transform:translateY(-50%);
z-index:2;
width:100%;
height:230px;
text-align:center;
text-shadow:0 3px 12px rgba(0,0,0,.95);
}

.countdown{
display:none;
position:absolute;
top:-58px;
left:50%;
transform:translateX(-50%);
padding:8px 16px;
min-width:165px;
border-radius:6px;
background:rgba(13,42,64,.88);
font-size:26px;
font-weight:600;
letter-spacing:2px;
color:#fff;
box-shadow:0 3px 12px rgba(0,0,0,.45);
text-shadow:0 2px 8px rgba(0,0,0,.75);
white-space:nowrap;
z-index:10;
}

.col.active .countdown{
display:block;
}

.name{
position:absolute;
top:0;
left:0;
right:0;
height:38px;
font-size:32px;
font-weight:900;
line-height:38px;
text-align:center;
margin:0;
padding:0;
display:block;
}

.t{
position:absolute;
top:62px;
left:0;
right:0;
height:64px;
font-size:58px;
font-weight:900;
line-height:64px;
letter-spacing:1px;
text-align:center;
margin:0;
padding:0;
display:block;
}

.subtimes{
position:absolute;
top:138px;
left:0;
right:0;
display:flex;
justify-content:center;
gap:120px;
font-size:28px;
font-weight:700;
line-height:1;
}

.col.active .name,
.col.active .t{
color:#ffffff;
}

.bottom{
height:10px;
margin-top:10px;
}

.gear{
position:fixed;
right:14px;
bottom:10px;
font-size:24px;
opacity:.5;
}

@media(max-width:900px){
.container{padding:12px 10px 8px}
.small{font-size:22px}
.big{font-size:32px}
.timebig{font-size:38px}
.cols{
flex:1;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:14px;
min-height:0;
padding-top:55px;
padding-bottom:18px;
}
.col{border-radius:14px}
.info{height:180px}
.name{font-size:20px;line-height:26px;height:26px}
.t{font-size:36px;line-height:42px;height:42px;top:44px}
.subtimes{top:92px;font-size:18px}
.countdown{top:-42px;font-size:18px;min-width:120px}
}
</style>

<style id="hide-old-clock">
#clock,
.digital-clock,
.live-clock,
.real-clock,
.time-display,
.top-clock{
display:none !important;
}
</style>


<style id="bahnhof-basel-style">
.bahnhof-clock{
position:fixed;
top:18px;
right:42px;
width:135px;
height:135px;
border-radius:50%;
background:#fff;
border:6px solid #111;
box-shadow:0 0 24px rgba(0,0,0,.45);
z-index:99999;
}

.bahnhof-clock::before{
content:'';
position:absolute;
top:50%;
left:50%;
width:16px;
height:16px;
background:#d40000;
border-radius:50%;
transform:translate(-50%,-50%);
z-index:20;
}

.clock-mark{
position:absolute;
width:4px;
height:14px;
background:#111;
left:50%;
top:6px;
margin-left:-2px;
transform-origin:center 61px;
}

.clock-hand{
position:absolute;
left:50%;
bottom:50%;
transform-origin:bottom center;
border-radius:10px;
}

.hour-hand{
width:6px;
height:34px;
background:#111;
margin-left:-3px;
}

.minute-hand{
width:4px;
height:52px;
background:#111;
margin-left:-2px;
}

.second-hand{
width:2px;
height:58px;
background:#d40000;
margin-left:-1px;
}
</style>


<style id="hide-old-clock-final">
#clock,
.digital-clock,
.live-clock,
.real-clock,
.time-display,
.top-clock{
display:none !important;
}
</style>


<style id="tv-photo-stable-css">
.col{
overflow:hidden !important;
}

.col img{
width:100% !important;
height:100% !important;
object-fit:contain !important;
display:block !important;
image-rendering:auto !important;
}
</style>

</head>
<body>

<div class="bahnhof-clock">
  <div class="clock-mark" style="transform:rotate(0deg)"></div>
  <div class="clock-mark" style="transform:rotate(30deg)"></div>
  <div class="clock-mark" style="transform:rotate(60deg)"></div>
  <div class="clock-mark" style="transform:rotate(90deg)"></div>
  <div class="clock-mark" style="transform:rotate(120deg)"></div>
  <div class="clock-mark" style="transform:rotate(150deg)"></div>
  <div class="clock-mark" style="transform:rotate(180deg)"></div>
  <div class="clock-mark" style="transform:rotate(210deg)"></div>
  <div class="clock-mark" style="transform:rotate(240deg)"></div>
  <div class="clock-mark" style="transform:rotate(270deg)"></div>
  <div class="clock-mark" style="transform:rotate(300deg)"></div>
  <div class="clock-mark" style="transform:rotate(330deg)"></div>

  <div class="clock-hand hour-hand" id="hourHand"></div>
  <div class="clock-hand minute-hand" id="minuteHand"></div>
  <div class="clock-hand second-hand" id="secondHand"></div>
</div>


<div class="container">
  <div class="headerline">
    <div class="lefttitle">
      <div class="small">Xhamia e fshatit</div>
      <div class="big">Topanicë 1</div>
    </div>
    <div class="rightclock">
      <div class="timebig" id="clock">--:--</div>
      <div class="status" id="status"></div>
    </div>
  </div>

  <div class="cols" id="cols"></div>
  <div class="bottom"></div>
</div>

<div class="gear">⚙</div>

<script>
const photos=["foto1.jpg","foto2.jpg","foto3.jpg","foto4.jpg","foto5.jpg"];
photos.forEach(src=>{ const img=new Image(); img.src=src; });

// Orët sipas versionit të fundit të kërkuar.
// Imsaku: ora kryesore është ndërruar me orën e majtë.
// Dreka: ora kryesore është ndërruar me orën poshtë.
const prayers=[
  {name:"Sabahu",  time:"04:18", sub:["02:56","04:58"]},
  {name:"Dreka",   time:"13:00", sub:["12:35"]},
  {name:"Ikindia", time:"16:36", sub:[]},
  {name:"Akshami", time:"20:06", sub:[]},
  {name:"Jacia",   time:"22:02", sub:[]}
];

const cols=document.getElementById("cols");

function kosovoNow(){
  const parts = new Intl.DateTimeFormat("en-GB",{
    timeZone:"Europe/Belgrade",
    year:"numeric",month:"2-digit",day:"2-digit",
    hour:"2-digit",minute:"2-digit",second:"2-digit",
    hour12:false
  }).formatToParts(new Date()).reduce((a,p)=>{a[p.type]=p.value;return a;},{});
  return new Date(`${parts.year}-${parts.month}-${parts.day}T${parts.hour}:${parts.minute}:${parts.second}`);
}

function minutesFromTime(t){
  const a=t.split(":").map(Number);
  return a[0]*60+a[1];
}

function currentMinutes(){
  const n=kosovoNow();
  return n.getHours()*60+n.getMinutes();
}

function getActiveIndex(){
  const now=currentMinutes();

  // Kolona aktive është vakti i ardhshëm.
  // Pra nëse ora është 02:24 dhe Sabahu është 04:18,
  // aktive mbetet Sabahu dhe countdown = 01:54:00.
  for(let i=0;i<prayers.length;i++){
    if(now < minutesFromTime(prayers[i].time)){
      return i;
    }
  }

  // Nëse kanë kaluar krejt vaktet, vakti i ardhshëm është Sabahu nesër.
  return 0;
}

function secondsUntilPrayer(activeIndex){
  const now=kosovoNow();
  const target=new Date(now);

  // Countdown merret vetëm prej orës së kolonës aktive.
  const a=prayers[activeIndex].time.split(":").map(Number);

  target.setHours(a[0],a[1],0,0);

  let diff=Math.floor((target-now)/1000);

  // Vetëm nëse kjo orë ka kaluar, llogarite për nesër.
  if(diff<=0) diff+=24*3600;

  return diff;
}

function formatCountdown(sec){
  const h=String(Math.floor(sec/3600)).padStart(2,"0");
  const m=String(Math.floor((sec%3600)/60)).padStart(2,"0");
  const s=String(sec%60).padStart(2,"0");
  return `${h}:${m}:${s}`;
}

function build(){
  cols.innerHTML="";
  prayers.forEach((p,i)=>{
    const d=document.createElement("div");
    d.className="col";
    d.style.setProperty("--pos",(i*25)+"%");
    d.innerHTML=`
      <div class="info">
        <div class="countdown">--:--:--</div>
        <div class="name">${p.name}</div>
        <div class="t">${p.time}</div>
        <div class="subtimes">${(p.sub||[]).map(x=>`<span>${x}</span>`).join("")}</div>
      </div>`;
    cols.appendChild(d);
  });
}

function setActive(i){
  const photo=`url("${photos[i]}")`;
  document.querySelectorAll(".col").forEach((c,n)=>{
    c.classList.toggle("active",n===i);
    c.style.setProperty("--photo",photo);
    const cd=c.querySelector(".countdown");
    if(cd){
      cd.textContent = n===i ? formatCountdown(secondsUntilPrayer(i)) : "";
    }
  });
}

function updateClock(){
  const now=kosovoNow();
  document.getElementById("clock").innerText =
    `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
}

function updateAll(){
  updateClock();
  setActive(getActiveIndex());
}

build();
updateAll();
setInterval(updateAll,1000);
</script>











<script id="bahnhof-clock-js">
(function(){

function updateClock(){

 const now = new Date();

 const sec = now.getSeconds();
 const min = now.getMinutes();
 const hr = now.getHours()%12;

 const secDeg = sec * 6;
 const minDeg = min * 6 + sec * 0.1;
 const hrDeg = hr * 30 + min * 0.5;

 document.getElementById('secondHand').style.transform =
   'rotate(' + secDeg + 'deg)';

 document.getElementById('minuteHand').style.transform =
   'rotate(' + minDeg + 'deg)';

 document.getElementById('hourHand').style.transform =
   'rotate(' + hrDeg + 'deg)';
}

document.addEventListener('DOMContentLoaded', function(){
 updateClock();
 setInterval(updateClock,1000);
});

})();
</script>

</html>
