<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Vaktia e Namazit - Topanicë 1</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Arial,Helvetica,sans-serif;
color:#fff;
background:linear-gradient(180deg,#4f7896 0%,#31506a 45%,#102d44 100%);
}

.container{
height:100vh;
padding:18px 18px 10px;
display:flex;
flex-direction:column;
}

/* KOLONA E EPERME */
.header{
height:192px;
border-radius:7px;
background:rgba(11,34,55,.70);
box-shadow:0 8px 26px rgba(0,0,0,.22);
display:grid;
grid-template-columns:33% 34% 33%;
align-items:center;
padding:0 28px;
position:relative;
}

.lefttitle{
text-align:left;
color:#5ed7bd;
text-shadow:0 2px 8px rgba(0,0,0,.35);
}

.lefttitle .line1{
font-size:43px;
font-weight:500;
line-height:1.15;
}

.lefttitle .line2{
font-size:42px;
font-weight:500;
line-height:1.15;
margin-top:4px;
}

.lefttitle .line3{
font-size:28px;
font-weight:500;
line-height:1.2;
margin-top:10px;
}

.calendar{
text-align:center;
align-self:center;
justify-self:center;
font-size:30px;
font-weight:500;
color:#5ed7bd;
text-shadow:0 2px 8px rgba(0,0,0,.35);
white-space:nowrap;
}

/* ORA DIGJITALE */
.clockwrap{
justify-self:end;
display:flex;
align-items:center;
justify-content:center;
}


/* ORA DIGJITALE - SI COUNTDOWN ME NDRIÇIM */
.digital-clock{
  min-width:265px;
  height:78px;
  padding:8px 28px;
  border-radius:8px;
  background:rgba(8,32,50,1);
  color:#fff;
  border:2px solid #49fff0;
  box-shadow:0 0 18px rgba(73,255,240,.75),0 6px 20px rgba(0,0,0,.75);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:62px;
  font-weight:900;
  letter-spacing:3px;
  line-height:1;
  text-align:center;
  text-shadow:0 0 10px rgba(73,255,240,.45),0 3px 12px rgba(0,0,0,.95);
  white-space:nowrap;
}

.bahnhof-clock{
width:136px;
height:136px;
border-radius:50%;
background:#f8f8f8;
border:6px solid #111;
box-shadow:0 7px 18px rgba(0,0,0,.45);
position:relative;
}

.bahnhof-clock::before{
content:'';
position:absolute;
left:50%;
top:50%;
width:13px;
height:13px;
background:#d00000;
border:2px solid #111;
border-radius:50%;
transform:translate(-50%,-50%);
z-index:30;
}

.mark{
position:absolute;
left:50%;
top:50%;
width:4px;
height:14px;
background:#111;
margin-left:-2px;
margin-top:-62px;
transform-origin:2px 62px;
}

.mark.small{
width:2px;
height:8px;
margin-left:-1px;
margin-top:-60px;
transform-origin:1px 60px;
}

.hand{
position:absolute;
left:50%;
top:50%;
transform-origin:50% 100%;
border-radius:10px;
background:#111;
z-index:20;
}

.hour{
width:8px;
height:38px;
margin-left:-4px;
margin-top:-38px;
}

.minute{
width:5px;
height:55px;
margin-left:-2.5px;
margin-top:-55px;
}

/* KOLONAT */
.cols{
height:78vh;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:28px;
min-height:0;
padding-top:36px;
padding-bottom:10px;
margin-top:auto;
}

.col{
position:relative;
overflow:visible;
border-radius:7px;
border:1px solid rgba(180,220,255,.55);
background:linear-gradient(180deg,rgba(20,54,83,.82),rgba(7,34,56,.92));
box-shadow:0 12px 30px rgba(0,0,0,.24);
transition:.35s ease;
}

.col::after{
content:"";
position:absolute;
inset:0;
background:radial-gradient(circle at center,rgba(255,255,255,.06),transparent 58%);
pointer-events:none;
}

.col.active{
border:2px solid #49fff0;
background:linear-gradient(180deg,rgba(41,121,155,.96),rgba(12,78,105,.98));
box-shadow:
  0 0 34px rgba(73,255,240,.95),
  0 0 78px rgba(73,255,240,.45),
  inset 0 0 34px rgba(73,255,240,.42),
  inset 0 0 95px rgba(255,255,255,.12),
  0 14px 36px rgba(0,0,0,.38);
}

.col.active::after{
background:
  radial-gradient(circle at center,rgba(255,255,255,.28),transparent 62%),
  linear-gradient(180deg,rgba(73,255,240,.22),rgba(73,255,240,.08));
}

.info{
position:absolute;
left:0;
right:0;
top:64%;
transform:translateY(-50%);
z-index:2;
height:300px;
text-align:center;
text-shadow:0 3px 12px rgba(0,0,0,.95);
}

.countdown{
display:none;
position:absolute;
top:-24px;
left:50%;
transform:translateX(-50%);
padding:7px 20px;
min-width:196px;
height:46px;
line-height:30px;
border-radius:8px;
background:rgba(8,32,50,1);
font-size:27px;
font-weight:800;
letter-spacing:2px;
color:#fff;
text-align:center;
white-space:nowrap;
z-index:99999;
border:2px solid #49fff0;
box-shadow:0 0 18px rgba(73,255,240,.75),0 6px 20px rgba(0,0,0,.75);
}

.col.active .countdown{
display:block;
}


.prayericon{
position:absolute;
left:50%;
top:-48px;
transform:translate(-50%,-50%);
width:118px;
height:78px;
object-fit:contain;
z-index:8;
filter:drop-shadow(0 3px 8px rgba(0,0,0,.55));
pointer-events:none;
}

.name{
font-size:38px;
font-weight:900;
line-height:1;
margin-bottom:64px;
}

.topline,
.bottomline{
height:1px;
width:82%;
margin:0 auto;
background:rgba(94,215,189,.75);
}

.t{
font-size:62px;
font-weight:900;
line-height:1;
letter-spacing:1px;
margin:37px 0 37px;
}

.subtimes{
display:flex;
justify-content:center;
gap:18px;
font-size:30px;
font-weight:800;
line-height:1;
color:#fff;
margin-top:-20px;
position:relative;
z-index:30;
}


.subtimes .subtop{
position:absolute;
top:-128px;
left:50%;
transform:translateX(-50%);
z-index:99999;
}

.subtimes span{
display:inline-flex;
align-items:center;
justify-content:center;
min-width:98px;
height:42px;
padding:5px 12px;
border-radius:8px;
background:rgba(8,32,50,1);
border:2px solid #49fff0;
box-shadow:0 0 14px rgba(73,255,240,.55),0 5px 16px rgba(0,0,0,.65);
letter-spacing:1px;
}

@media(max-width:900px){
.container{padding:12px 10px 8px}
.header{height:150px;padding:0 14px}
.lefttitle .line1,.lefttitle .line2{font-size:25px}
.lefttitle .line3{font-size:17px}
.calendar{font-size:18px}
.bahnhof-clock{width:88px;height:88px}
.digital-clock{min-width:170px;height:54px;font-size:36px;padding:6px 16px;letter-spacing:2px}
.mark{height:9px;margin-top:-40px;transform-origin:2px 40px}
.mark.small{height:5px;margin-top:-38px;transform-origin:1px 38px}
.hour{height:25px;width:5px;margin-left:-2.5px;margin-top:-25px}
.minute{height:36px;width:3px;margin-left:-1.5px;margin-top:-36px}
.cols{gap:10px;padding-top:25px}
.name{font-size:22px;margin-bottom:42px}
.t{font-size:36px;margin:26px 0 26px}
.subtimes{
display:flex;
justify-content:center;
gap:18px;
font-size:30px;
font-weight:800;
line-height:1;
color:#fff;
margin-top:-20px;
position:relative;
z-index:30;
}


.subtimes .subtop{
position:absolute;
top:-128px;
left:50%;
transform:translateX(-50%);
z-index:99999;
}

.subtimes span{
display:inline-flex;
align-items:center;
justify-content:center;
min-width:98px;
height:42px;
padding:5px 12px;
border-radius:8px;
background:rgba(8,32,50,1);
border:2px solid #49fff0;
box-shadow:0 0 14px rgba(73,255,240,.55),0 5px 16px rgba(0,0,0,.65);
letter-spacing:1px;
}
.info{height:225px}
.countdown{font-size:18px;min-width:130px;height:34px;line-height:20px;top:-18px;padding:5px 12px}
}

/* FUEGO 40EL TV FIX */

}

@media (min-width:901px){

.name{font-size:38px !important;}
.t{font-size:62px !important;}
.subtimes{font-size:30px !important;}
}

</style>

function kosovoNow(){
  return new Date(new Date().toLocaleString("en-US",{timeZone:"Europe/Belgrade"}));
}

function updateHeaderCalendar(){
  const now=kosovoNow();
  const el=document.getElementById("calendarText");
  if(!el) return;
  const dd=String(now.getDate()).padStart(2,"0");
  const mm=String(now.getMonth()+1).padStart(2,"0");
  const yy=now.getFullYear();
  const key=dateKey(now);
  const p=prayerCalendar[key];
  el.textContent = `${dd}.${mm}.${yy} / BIK Kosovë`;
  if(!p) el.textContent += " / data jashtë tabelës";
}

function refreshPrayersIfDateChanged(){
  const now=kosovoNow();
  const key=dateKey(now);
  if(key!==activeDateKey){
    activeDateKey=key;
    prayers=getPrayersForDate(now);
    build();
    fixIconsForTV();
  }
}

function minutesFromTime(t){
  const a=t.split(":").map(Number);
  return a[0]*60+a[1];
}

function currentMinutes(){
  const n=kosovoNow();
  return n.getHours()*60+n.getMinutes();
}

function getActiveIndex(){
  const now=currentMinutes();
  for(let i=0;i<prayers.length;i++){
    if(now < minutesFromTime(prayers[i].time)) return i;
  }
  return 0;
}

function secondsUntilPrayer(activeIndex){
  const now=kosovoNow();
  const target=new Date(now);
  let targetTime=prayers[activeIndex].time;

  if(activeIndex===0 && currentMinutes() >= minutesFromTime(prayers[4].time)){
    const tomorrowKey=dateKey(addDays(now,1));
    if(prayerCalendar[tomorrowKey]){
      targetTime=prayerCalendar[tomorrowKey].sabahu;
      target.setDate(target.getDate()+1);
    }
  }

  const a=targetTime.split(":").map(Number);
  target.setHours(a[0],a[1],0,0);

  let diff=Math.floor((target-now)/1000);
  if(diff<=0) diff+=24*3600;

  return diff;
}

function formatCountdown(sec){
  const h=String(Math.floor(sec/3600)).padStart(2,"0");
  const m=String(Math.floor((sec%3600)/60)).padStart(2,"0");
  const s=String(sec%60).padStart(2,"0");
  return `${h}:${m}:${s}`;
}

function build(){
  cols.innerHTML="";

  prayers.forEach((p,idx)=>{
    const d=document.createElement("div");
    d.className="col";
    d.innerHTML=`
      <div class="countdown">--:--:--</div>
      <div class="info">
        <img class="prayericon" src="${prayerIcons[idx]}" alt="">
        <div class="name">${p.name}</div>
        <div class="topline"></div>
        <div class="t">${p.time}</div>
        <div class="bottomline"></div>
        <div class="subtimes">
${(p.sub||[]).map((x,i)=>{
if(p.name==="Sabahu" && i===0){
return `<span class="subtop">${x}</span>`;
}
return `<span>${x}</span>`;
}).join("")}
</div>
      </div>`;
    cols.appendChild(d);
  });
}

function setActive(i){
  document.querySelectorAll(".col").forEach((c,n)=>{
    c.classList.toggle("active",n===i);

    const cd=c.querySelector(".countdown");
    if(cd) cd.textContent=n===i ? formatCountdown(secondsUntilPrayer(i)) : "";
  });
}

function updateAll(){
  refreshPrayersIfDateChanged();
  updateHeaderCalendar();
  setActive(getActiveIndex());
}

function updateDigitalClock(){
  const now=kosovoNow();
  const h=String(now.getHours()).padStart(2,"0");
  const m=String(now.getMinutes()).padStart(2,"0");
  const el=document.getElementById("digitalClock");
  if(el) el.textContent=h+":"+m;
}


function fixIconsForTV(){
  document.querySelectorAll('.prayericon').forEach((icon,i)=>{
    icon.style.top='-48px';
    icon.style.transform='translate(-50%,-50%)';
    icon.style.width='142px';
    icon.style.height='94px';
    icon.style.filter='drop-shadow(0 3px 8px rgba(0,0,0,.55))';

    if(i===1 || i===2){
      icon.style.width='170px';
      icon.style.height='113px';
    }

    if(i===3){
      icon.style.width='113px';
      icon.style.height='74px';
    }

    if(i===0 || i===2 || i===4){
      icon.style.filter='drop-shadow(0 0 7px rgba(255,255,255,.95)) drop-shadow(0 0 18px rgba(255,255,255,.75)) drop-shadow(0 3px 8px rgba(0,0,0,.55))';
    }
  });
}

build();
fixIconsForTV();
updateAll();
updateDigitalClock();

setInterval(updateAll,1000);
setInterval(updateDigitalClock,1000);
setInterval(fixIconsForTV,60000);



setInterval(()=>{
  const n=kosovoNow();
  if(n.getHours()===3 && n.getMinutes()===33 && n.getSeconds()===0){
    location.reload();
  }
},1000);

</script>
